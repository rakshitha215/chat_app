<!DOCTYPE html>
<html>
<head>
<title>Chat App Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #ece5dd;
}

.app {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 280px;
    background: #075e54;
    color: white;
}

.sidebar h2 {
    padding: 15px;
    margin: 0;
}

.user {
    padding: 12px;
    cursor: pointer;
}

.user:hover {
    background: #128c7e;
}

.user.active {
    background: #25d366;
}

/* Chat */
.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-header {
    background: #ededed;
    padding: 15px;
    font-weight: bold;
}

.chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

/* Messages */
.message {
    max-width: 60%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
}

.me {
    align-self: flex-end;
    background: #dcf8c6;
}

.other {
    align-self: flex-start;
    background: white;
}

/* Input */
.input-area {
    display: flex;
    padding: 10px;
    background: #f0f0f0;
}

.input-area input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
}

.input-area button {
    margin-left: 10px;
    padding: 10px 15px;
    background: #075e54;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

<!-- Sidebar -->
<div class="sidebar">
    <h2>Chats</h2>
    <div id="userList"></div>
</div>

<!-- Chat -->
<div class="chat-container">
    <div class="chat-header" id="chatTitle">Select Chat</div>
    <div class="chat-box" id="chat"></div>

    <div class="input-area">
        <input id="message" placeholder="Type message...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

</div>

<script>
// 🔹 TOKEN
const urlParams = new URLSearchParams(window.location.search);
let token = urlParams.get("token");

if (!token) alert("Token missing");

// 🔹 USER ID
function getMyId() {
    const payload = JSON.parse(atob(token.split('.')[1]));
    return payload.user_id.id;
}

let ws;
let currentChat = null;

// 🔹 USERS (demo)
let users = [1, 2];

// 🔹 STORAGE
let chats = JSON.parse(localStorage.getItem("chats")) || {};

// 🔹 LOAD USERS
function loadUsers() {
    const list = document.getElementById("userList");
    list.innerHTML = "";

    createUser("👥 Group 1", "group");

    users.forEach(u => {
        if (u !== getMyId()) {
            createUser("👤 User " + u, u);
        }
    });

    // ✅ Auto select first chat
    setTimeout(() => {
        const first = document.querySelector(".user");
        if (first) first.click();
    }, 100);
}

function createUser(name, id) {
    const div = document.createElement("div");
    div.className = "user";
    div.innerText = name;

    div.onclick = function () {
        currentChat = id;

        document.querySelectorAll(".user").forEach(el => el.classList.remove("active"));
        this.classList.add("active");

        document.getElementById("chatTitle").innerText = name;

        renderMessages();
    };

    document.getElementById("userList").appendChild(div);
}

// 🔹 CONNECT
function connectWebSocket() {
    ws = new WebSocket(`ws://127.0.0.1:8000/ws?token=${token}`);

    ws.onopen = () => {
        console.log("✅ Connected:", getMyId());
    };

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);

        let key;

        if (data.type === "group") {
            key = "group";
        } else {
            // ✅ FINAL FIX (consistent key)
            key = [data.sender_id, data.receiver_id].sort().join("_");
        }

        if (!key) return;

        if (!chats[key]) chats[key] = [];

        chats[key].push(data);

        localStorage.setItem("chats", JSON.stringify(chats));

        renderMessages();
    };

    ws.onerror = (err) => {
        console.error("WebSocket error", err);
    };
}

// 🔹 SEND MESSAGE
function sendMessage() {
    let msg = document.getElementById("message").value;

    if (!msg) return;

    if (!currentChat) {
        alert("Select chat first");
        return;
    }

    if (currentChat === "group") {
        ws.send(JSON.stringify({
            type: "group",
            group_id: 1,
            content: msg
        }));
    } else {
        ws.send(JSON.stringify({
            type: "private",
            receiver_id: currentChat,
            content: msg
        }));
    }

    document.getElementById("message").value = "";
}

// 🔹 RENDER
function renderMessages() {
    const chatBox = document.getElementById("chat");
    chatBox.innerHTML = "";

    let key = currentChat === "group"
        ? "group"
        : [getMyId(), currentChat].sort().join("_");

    let messages = chats[key] || [];

    messages.forEach(data => {
        const msg = document.createElement("div");
        msg.className = "message";

        if (data.sender_id === getMyId()) {
            msg.classList.add("me");
        } else {
            msg.classList.add("other");
        }

        msg.innerText = data.content;
        chatBox.appendChild(msg);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
}

// 🚀 START
loadUsers();
connectWebSocket();
</script>

</body>
</html>
