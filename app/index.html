<!DOCTYPE html>
<html>
<head>
<title>Chat App Pro</title>

<style>
body { margin: 0; font-family: Arial; background: #ece5dd; }
.app { display: flex; height: 100vh; }

/* Sidebar */
.sidebar { width: 280px; background: #075e54; color: white; }
.sidebar h2 { padding: 15px; margin: 0; }

.user { padding: 12px; cursor: pointer; border-bottom: 1px solid #0b3d36; }
.user:hover { background: #128c7e; }
.user.active { background: #25d366; }

/* Chat */
.chat-container { flex: 1; display: flex; flex-direction: column; }
.chat-header { background: #ededed; padding: 15px; font-weight: bold; }
.chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }

/* Messages */
.message { max-width: 60%; padding: 10px; margin: 5px; border-radius: 10px; }
.me { align-self: flex-end; background: #dcf8c6; }
.other { align-self: flex-start; background: white; }

/* Input */
.input-area { display: flex; padding: 10px; background: #f0f0f0; }
.input-area input { flex: 1; padding: 10px; border-radius: 20px; border: none; }
.input-area button {
    margin-left: 10px;
    padding: 10px 15px;
    background: #075e54;
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
    <h2>Chats</h2>
    <div id="userList"></div>
</div>

<div class="chat-container">
    <div class="chat-header" id="chatTitle">Select Chat</div>
    <div class="chat-box" id="chat"></div>

    <div class="input-area">
        <input id="message" placeholder="Type message...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

</div>

<script>
// 🔹 TOKEN
const urlParams = new URLSearchParams(window.location.search);
let token = urlParams.get("token");
if (!token) alert("Token missing");

// 🔹 USER ID
function getMyId() {
    const payload = JSON.parse(atob(token.split('.')[1]));
    return payload.user_id.id;
}

let ws;
let currentChat = null;

// 🔹 USERS
let users = [1, 2];

// 🔹 STORAGE
let chats = JSON.parse(localStorage.getItem("chats")) || {};

// 🔹 LOAD USERS
function loadUsers() {
    const list = document.getElementById("userList");
    list.innerHTML = "";

    createUser("👥 Group 1", "group");

    users.forEach(u => {
        if (u !== getMyId()) {
            createUser("👤 User " + u, u);
        }
    });

    setTimeout(() => {
        const first = document.querySelector(".user");
        if (first) first.click();
    }, 100);
}

// 🔹 CREATE USER
function createUser(name, id) {
    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
        <div style="font-weight:bold">${name}</div>
        <div style="font-size:12px;opacity:0.7" id="last-${id}">
            No messages yet
        </div>
    `;

    div.onclick = async function () {
        currentChat = id;

        document.querySelectorAll(".user").forEach(el => el.classList.remove("active"));
        this.classList.add("active");

        await updateHeader();   // ✅ FIX

        renderMessages();
    };

    document.getElementById("userList").appendChild(div);
}

// 🔹 CONNECT WS
function connectWebSocket() {
    ws = new WebSocket(`ws://127.0.0.1:8000/ws?token=${token}`);

    ws.onopen = () => {
        console.log("✅ Connected:", getMyId());
    };

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);

        // ✍️ Typing
        if (data.type === "typing") {
            if (currentChat === data.sender_id) showTyping();
            return;
        }

        let key = data.type === "group"
            ? "group"
            : [data.sender_id, data.receiver_id].sort().join("_");

        if (!chats[key]) chats[key] = [];
        chats[key].push(data);

        localStorage.setItem("chats", JSON.stringify(chats));

        // update sidebar
        let last = document.getElementById(`last-${data.sender_id}`) ||
                   document.getElementById(`last-${data.receiver_id}`);

        if (last) last.innerText = data.content;

        renderMessages();

        // ✅ refresh status
        if (currentChat && currentChat !== "group") {
            updateHeader();
        }
    };
}

// 🔹 SEND MESSAGE
function sendMessage() {
    let msg = document.getElementById("message").value;

    if (!msg || !currentChat) return;

    if (currentChat === "group") {
        ws.send(JSON.stringify({
            type: "group",
            group_id: 1,
            content: msg
        }));
    } else {
        ws.send(JSON.stringify({
            type: "private",
            receiver_id: currentChat,
            content: msg
        }));
    }

    document.getElementById("message").value = "";
}

// 🔹 TYPING SEND
document.getElementById("message").addEventListener("input", () => {
    if (currentChat && currentChat !== "group") {
        ws.send(JSON.stringify({
            type: "typing",
            receiver_id: currentChat
        }));
    }
});

// 🔹 SHOW TYPING
function showTyping() {
    const header = document.getElementById("chatTitle");
    header.innerText = "Typing... ✍️";

    setTimeout(async () => {
        await updateHeader();   // ✅ FIX
    }, 1500);
}

// 🔹 UPDATE HEADER (FINAL)
async function updateHeader() {
    if (!currentChat) return;

    let name = currentChat === "group"
        ? "👥 Group 1"
        : "👤 User " + currentChat;

    if (currentChat === "group") {
        document.getElementById("chatTitle").innerText =
            name + " (👥 Group Chat)";
        return;
    }

    try {
        let res = await fetch(`http://127.0.0.1:8000/status/${currentChat}`);
        let data = await res.json();

        let statusText = "";

        if (data.status === "online") {
            statusText = "🟢 Online";
        } else if (data.last_seen) {
            let t = new Date(data.last_seen).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });
            statusText = "🔴 Last seen " + t;
        } else {
            statusText = "🔴 Offline";
        }

        document.getElementById("chatTitle").innerText =
            name + " (" + statusText + ")";
    } catch {
        document.getElementById("chatTitle").innerText =
            name + " (Unknown)";
    }
}

// 🔹 AUTO REFRESH STATUS
setInterval(() => {
    if (currentChat && currentChat !== "group") {
        updateHeader();
    }
}, 5000);

// 🔹 RENDER
function renderMessages() {
    const chatBox = document.getElementById("chat");
    chatBox.innerHTML = "";

    let key = currentChat === "group"
        ? "group"
        : [getMyId(), currentChat].sort().join("_");

    let messages = chats[key] || [];

    messages.forEach(data => {
        const msg = document.createElement("div");
        msg.className = "message";

        if (data.sender_id === getMyId()) msg.classList.add("me");
        else msg.classList.add("other");

        let time = data.timestamp
            ? new Date(data.timestamp).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            })
            : "";

        msg.innerHTML = `
            <div>${data.content}</div>
            <div style="font-size:10px;text-align:right;opacity:0.6">${time}</div>
        `;

        chatBox.appendChild(msg);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
}

// 🚀 START
loadUsers();
connectWebSocket();
</script>

</body>
</html>
